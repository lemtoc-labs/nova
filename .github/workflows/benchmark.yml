name: Zsh Benchmark (Self-hosted)

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: zsh-benchmark-self-hosted
  cancel-in-progress: false

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: Zsh Interactive Latency
    runs-on: [self-hosted, nova-bench]
    timeout-minutes: 30
    env:
      NOVA_ZSH_BENCH_ITERS: 16
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Add local tool paths
        run: |
          {
            echo "$HOME/.local/share/mise/shims"
            echo "$HOME/.nix-profile/bin"
            echo "/etc/profiles/per-user/$USER/bin"
            echo "/run/current-system/sw/bin"
            echo "/nix/var/nix/profiles/default/bin"
            echo "/opt/homebrew/bin"
            echo "/opt/homebrew/sbin"
          } >> "$GITHUB_PATH"

      - name: Build release binary
        run: nix develop --command cargo build --release

      - name: Run zsh benchmark
        run: nix develop --command scripts/bench-zsh > zsh-bench-result.txt

      - name: Convert benchmark result
        run: .github/scripts/convert-zsh-bench.sh zsh-bench-result.txt benchmark-result.json

      - name: Load previous benchmark baseline
        env:
          NOVA_BENCH_BASE_SHA: ${{ github.event.before }}
        run: |
          baseline_sha="$NOVA_BENCH_BASE_SHA"
          if [[ -z "$baseline_sha" || "$baseline_sha" == "0000000000000000000000000000000000000000" ]]; then
            baseline_sha="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          if git fetch --depth=1 origin gh-pages:refs/remotes/origin/gh-pages &&
            git show refs/remotes/origin/gh-pages:bench/zsh/data.js > zsh-bench-data.js &&
            .github/scripts/extract-zsh-bench-baseline.sh zsh-bench-data.js "$baseline_sha" previous-benchmark-result.json zsh-bench-baseline.env; then
            cat zsh-bench-baseline.env >> "$GITHUB_ENV"
          else
            printf '[]\n' > previous-benchmark-result.json
            {
              echo "NOVA_BENCH_PREVIOUS_FOUND=false"
              echo "NOVA_BENCH_PREVIOUS_MATCHED=false"
              echo "NOVA_BENCH_PREVIOUS_TARGET_SHA=$baseline_sha"
              echo "NOVA_BENCH_PREVIOUS_SHA="
              echo "NOVA_BENCH_PREVIOUS_URL="
            } >> "$GITHUB_ENV"
          fi

      - name: Render benchmark summary
        run: .github/scripts/render-zsh-bench-comment.sh benchmark-result.json zsh-bench-summary.md previous-benchmark-result.json

      - name: Write benchmark summary
        run: cat zsh-bench-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Disable git commit signing in workspace
        run: git config --local commit.gpgsign false

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: Zsh Interactive Latency
          tool: customSmallerIsBetter
          output-file-path: benchmark-result.json
          benchmark-data-dir-path: bench/zsh
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-always: true
          fail-on-alert: false
          summary-always: true

      - name: Publish benchmark dashboard
        run: .github/scripts/publish-zsh-bench-dashboard.sh .github/benchmark/zsh/index.html bench/zsh

      - name: Fail on red zsh-bench metrics
        run: .github/scripts/check-zsh-bench-thresholds.sh benchmark-result.json

      - name: Clean benchmark temporary files
        if: always()
        run: |
          rm -f zsh-bench-result.txt benchmark-result.json previous-benchmark-result.json zsh-bench-baseline.env zsh-bench-data.js zsh-bench-summary.md
