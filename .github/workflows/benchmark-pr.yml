name: Zsh Benchmark (PR)

on:
  pull_request:
    branches:
      - main

concurrency:
  group: zsh-benchmark-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  benchmark:
    name: Zsh Interactive Latency
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      NOVA_ZSH_BENCH_ITERS: 16
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release

      - name: Install zsh-bench
        run: .github/scripts/install-zsh-bench.sh "$RUNNER_TEMP/zsh-bench"

      - name: Run zsh benchmark
        env:
          NOVA_ZSH_BENCH: ${{ runner.temp }}/zsh-bench/zsh-bench
        run: scripts/bench-zsh > zsh-bench-result.txt

      - name: Convert benchmark result
        run: .github/scripts/convert-zsh-bench.sh zsh-bench-result.txt benchmark-result.json

      - name: Render benchmark comment
        env:
          NOVA_BENCH_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          NOVA_BENCH_COMMIT_URL: ${{ github.event.pull_request.head.repo.html_url }}/commit/${{ github.event.pull_request.head.sha }}
        run: .github/scripts/render-zsh-bench-comment.sh benchmark-result.json zsh-bench-comment.md

      - name: Write benchmark summary
        run: cat zsh-bench-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment benchmark result on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/upsert-pr-comment.sh "${{ github.event.pull_request.number }}" zsh-bench-comment.md

      - name: Fail on red zsh-bench metrics
        run: .github/scripts/check-zsh-bench-thresholds.sh benchmark-result.json

      - name: Clean benchmark temporary files
        if: always()
        run: |
          rm -rf "$RUNNER_TEMP/zsh-bench"
          rm -f zsh-bench-result.txt benchmark-result.json zsh-bench-comment.md
